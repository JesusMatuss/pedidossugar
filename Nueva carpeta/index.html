<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen flex flex-col overflow-hidden">
    <!-- Barra de Navegación de Pestañas -->
    <div class="flex gap-2 p-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <button id="btn-pedidos" onclick="showTab('pedidos')" class="px-4 py-2 bg-orange-600 text-white rounded-lg font-bold">Pedidos</button>
        <button id="btn-deliverys" onclick="showTab('deliverys')" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg font-bold">Deliverys</button>
        <button id="themeToggle" class="ml-auto p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">🌙/☀️</button>
    </div>

    <!-- Contenido -->
    <main class="flex-1 overflow-hidden">
        <!-- Contenido Pedidos -->
        <div id="tab-pedidos" class="h-full flex flex-col">
            <!-- Barra de Resumen -->
            <div id="summaryBar" class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 dark:bg-gray-850 border-b border-gray-300 dark:border-gray-700">
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700 text-center">
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Ingresos</p>
                    <p id="totalIngresos" class="text-2xl font-black text-emerald-600 dark:text-emerald-400">$0.00</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700 text-center">
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Paquetes</p>
                    <p id="totalPaquetes" class="text-2xl font-black text-gray-900 dark:text-white">0</p>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow border dark:border-gray-700 text-center">
                    <p class="text-xs text-gray-500 uppercase font-bold">Pedidos Pendientes</p>
                    <p id="totalPendientes" class="text-2xl font-black text-amber-600 dark:text-amber-400">0</p>
                </div>
            </div>

            <!-- Barra de Herramientas -->
            <div class="p-4 bg-gray-100 dark:bg-gray-800 border-b border-gray-300 dark:border-gray-700 flex flex-wrap gap-4 items-center">
                <input type="datetime-local" id="startDateFilter" class="bg-white dark:bg-gray-700 p-2 rounded-lg border dark:border-gray-600 dark:text-white">
                <span class="dark:text-gray-400">hasta</span>
                <input type="datetime-local" id="endDateFilter" class="bg-white dark:bg-gray-700 p-2 rounded-lg border dark:border-gray-600 dark:text-white">
                <input type="text" id="searchClient" placeholder="🔍 Buscar cliente..." class="flex-grow bg-white dark:bg-gray-700 p-2 rounded-lg border dark:border-gray-600 dark:text-white">
                <select id="sortOrder" class="bg-white dark:bg-gray-700 p-2 rounded-lg border dark:border-gray-600 dark:text-white">
                    <option value="newest">Más recientes</option>
                    <option value="oldest">Más antiguos</option>
                </select>
                <div id="loadingIndicator" class="hidden text-sm text-orange-500 font-bold animate-pulse">Actualizando...</div>
                <button onclick="generarFacturaDiaria()" class="px-3 py-1.5 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg text-xs transition">🖨️ Factura Diaria</button>
            </div>

            <!-- Columnas -->
            <div class="flex-1 flex overflow-hidden">
                <section class="flex-1 overflow-y-auto p-4 border-r border-gray-300 dark:border-gray-700">
                    <h2 class="text-lg font-semibold mb-4 text-orange-600 dark:text-orange-400">📦 Delivery</h2>
                    <div id="deliveryContainer" class="space-y-4"></div>
                </section>
                <section class="flex-1 overflow-y-auto p-4">
                    <h2 class="text-lg font-semibold mb-4 text-gray-600 dark:text-gray-400">🏠 Retiro en Local</h2>
                    <div id="localContainer" class="space-y-4"></div>
                </section>
            </div>
        </div>
        
        <!-- Contenido Deliverys -->
        <div id="tab-deliverys" class="h-full p-6 hidden overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6 dark:text-white">Gestión de Deliverys</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow border dark:border-gray-700">
                    <h3 class="text-lg font-bold mb-4 dark:text-white">Agregar Trabajador</h3>
                    <div class="flex gap-2">
                        <input type="text" id="workerName" placeholder="Nombre" class="flex-grow p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        <button onclick="addWorker()" class="px-4 py-2 bg-orange-600 text-white rounded-lg font-bold">Agregar</button>
                    </div>
                    <ul id="workersList" class="mt-4 space-y-2"></ul>
                </div>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow border dark:border-gray-700">
                    <h3 class="text-lg font-bold mb-4 dark:text-white">Resumen de Pagos</h3>
                    <div id="workersSummary" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function showTab(tab) {
            document.getElementById('tab-pedidos').classList.toggle('hidden', tab !== 'pedidos');
            document.getElementById('tab-deliverys').classList.toggle('hidden', tab !== 'deliverys');
            document.getElementById('btn-pedidos').classList.toggle('bg-orange-600', tab === 'pedidos');
            document.getElementById('btn-pedidos').classList.toggle('bg-gray-200', tab !== 'pedidos');
            document.getElementById('btn-deliverys').classList.toggle('bg-orange-600', tab === 'deliverys');
            document.getElementById('btn-deliverys').classList.toggle('bg-gray-200', tab !== 'deliverys');
            // Refrescar resumen al cambiar a la pestaña Deliverys
            if (tab === 'deliverys' && typeof renderWorkers === 'function') {
                renderWorkers();
            }
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
